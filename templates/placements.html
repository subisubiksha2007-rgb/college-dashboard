<!-- Search -->

<div class="search-box">

    <input
        type="text"
        id="searchInput"
        placeholder="Search Student / Register Number">

    <select id="statusFilter">

        <option value="">All Status</option>

        <option value="Preparing">Preparing</option>

        <option value="Placed">Placed</option>

        <option value="Not Eligible">Not Eligible</option>

    </select>

</div>
<!-- ===============================
PLACEMENT PREPARATION SUMMARY
=============================== -->

<div class="card">

    <h2>Placement Preparation Summary</h2>

    <div class="summary-cards">

        <div class="card">
            <h3>Total Students</h3>
            <h2 id="totalStudents">0</h2>
        </div>

        <div class="card">
            <h3>Preparing</h3>
            <h2 id="preparingStudents">0</h2>
        </div>

        <div class="card">
            <h3>Placed</h3>
            <h2 id="placedStudents">0</h2>
        </div>

        <div class="card">
            <h3>Companies</h3>
            <h2 id="companyCount">7</h2>
        </div>

    </div>

</div>
<!-- =====================================
Search + Filter + Buttons
===================================== -->

<div class="section-header">

    <h2>Placement Students</h2>

    <div style="display:flex;gap:10px;align-items:center;">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Student..."
            style="
                width:260px;
                padding:10px;
                border:1px solid #ccc;
                border-radius:8px;
            ">

        <select
            id="statusFilter"
            style="
                padding:10px;
                border:1px solid #ccc;
                border-radius:8px;
            ">

            <option value="">All Status</option>

            <option value="Preparing">Preparing</option>

            <option value="Placed">Placed</option>

            <option value="Interview">Interview</option>

            <option value="Rejected">Rejected</option>

        </select>

        <button class="add-btn" onclick="openPlacementForm()">

            <i class="fas fa-plus"></i>

            Add Student

        </button>

        <button id="export-csv">

            <i class="fas fa-file-csv"></i>

            Export CSV

        </button>

    </div>

</div>

<!-- =====================================
Add / Edit Placement Student Modal
===================================== -->

<div class="modal-overlay" id="placementModal">

<div class="modal-card">

<div class="modal-header">

<h2 id="modalTitle">

Add Placement Student

</h2>

<button class="modal-close"
onclick="closePlacementForm()">

&times;

</button>

</div>

<div class="modal-body">

<form id="placementForm" class="student-form">

<label>

Register Number

<input
type="text"
id="regNo"
required>

</label>

<label>

Student Name

<input
type="text"
id="studentName"
required>

</label>

<label>

Company

<input
type="text"
id="companyName">

</label>

<label>

Role

<input
type="text"
id="jobRole">

</label>

<label>

Package (LPA)

<input
type="text"
id="package">

</label>

<label>

Status

<select id="placementStatus">

<option>Preparing</option>

<option>Interview</option>

<option>Placed</option>

<option>Rejected</option>

</select>

</label>

<div class="form-actions full-width">

<button
type="button"
class="cancel-btn"
onclick="closePlacementForm()">

Cancel

</button>

<button
type="submit"
class="save-btn">

Save Student

</button>

</div>
